# 若机械臂姿态“扭曲”、不像真实机械臂：
# 1) 核对 orion.urdf 各关节 origin/axis/limit 与实机一致，零位与 SRDF ready 一致；
# 2) 在 orion_moveit_config/config/joint_limits.yaml 为各关节加 has_position_limits/min_position/max_position（实机限位），避免规划到不可达姿态；
# 3) 同一笛卡尔位姿有多组 IK 解（肘上/肘下等），KDL 可能选到不自然解，可尝试 TRAC-IK 或 path_constraints 限制肘/腕范围。

# Lift: 缆绳 pick 抬升段距离范围 [m]（见 pick_task_builder）；min 过大会在自碰/限位时整段失败
lift_object_min_dist: 0.05
lift_object_max_dist: 0.25

# 支撑面 link：非空时在 Lift 前加 allow collision (object,support)、Lift 后加 forbid
# 无桌面时留空 ""；加桌面后填对应 collision object 的 id 或 link 名（如 "table"）
support_surface_link: ""

# 放置目标（base_link 下）：xy 为放置点，z 为最终放置高度（建议 桌面高+半物体高，如 0.4）
# 动态放置时由 /place_pose 话题提供（geometry_msgs/PoseStamped，frame_id=base_link），无话题时使用下列参数
# 内部会使用 preplace_z = place_pose_z + lower_to_place_max_dist，再 LIN 沿手爪 -Z 下降，末端姿态固定朝下
place_pose_x: 0.35
place_pose_y: 0.15
place_pose_z: 0.4
place_pose_qx: 0.0
place_pose_qy: 0.0
place_pose_qz: 0.0
place_pose_qw: 1.0

# 长杆夹持点沿物体 Z 相对几何中心的偏移 [m]，正=物体+Z 方向；0=中心
grasp_offset_along_axis: 0.0
# 放置前运输姿态：SRDF 中 arm 的 group_state 名，非空则在 pre-place 前先移到此姿态；长杆建议 "transport"
place_transport_pose: "transport"

# 缆绳侧向抓取候选参数（5cm 缆绳推荐）+ 分段碰撞
cable_side_grasp:
  # 预抓距闭合准备位沿接近方向 n 的位移 [m]；浅预抓利于 IK
  pregrasp_offset_candidates: [0.030, 0.040, 0.050]
  grasp_depth_candidates: [0.010, 0.015, 0.020]
  # 未配置 pregrasp_offset_candidates 时回退使用 approach_dist_candidates
  approach_dist_candidates: [0.10, 0.08, 0.06, 0.04]
  # gripper_tcp 相对抓取语义系（y=缆绳轴、z=接近方向）的固定安装补偿，ZYX 外旋，单位 °；标定后填入
  # 若抓取成功但视觉上仍像「腕部贴缆绳」：优先增大 orion_description/urdf/orion.urdf 中 joint_Link6_gripper_tcp 的 z
  tcp_bias_rpy_deg: [0.0, 0.0, 0.0]
  retreat_dist: 0.05
  axial_shift_candidates: [-0.05, 0.0, 0.05]
  roll_candidates_deg: [0.0]
  cable_total_length: 3.0
  cable_segment_length: 0.25
  cable_radius: 0.025
  grasp_neighbor_segments: 1
  # Pilz LIN 预抓→闭合位：降低缩放避免超过 joint_limits max_acceleration（常见 0.5）；仍报超限再减小加速度项
  approach_lin_velocity_scaling: 0.5
  approach_lin_acceleration_scaling: 0.35

# Retreat 第一段（short clear）[m]，先脱离释放区；第二段用 retreat_min/max_dist
retreat_short_min_dist: 0.03
retreat_short_max_dist: 0.05
# Retreat 第二段（long leave）[m]
retreat_min_dist: 0.07
retreat_max_dist: 0.25

# 放置前下降距离范围 [m]
lower_to_place_min_dist: 0.05
lower_to_place_max_dist: 0.12

# 物体位姿由 /object_pose 话题提供（geometry_msgs/PoseStamped，frame_id=base_link），不在此配置
#
# 动态抓取：夹爪不硬性保持闭合；执行“闭合”段后根据 /left_arm_gripped（std_msgs/Float32）判断抓稳再抬升，
# 放置“张开”段后根据 left_arm_gripped 从 lock 变为 unlock 再退离。left_arm_gripped 由 arm_sensor_to_joint_state 从 HoloOcean ArmSensor 发布。

# ---------- 审批模式（CheckPick / CheckPlace）工作空间与诊断阈值 ----------
# 基座为 base_link 原点，单位 m。超过 max_reach_hard 直接禁止；超过 max_reach_soft 给 warning
feasibility:
  max_reach_hard: 1.20
  max_reach_soft: 1.10
  min_reach_safe: 0.12
  z_min: -0.50
  z_max: 0.80
  # 关节极限余量 [rad]，小于此值报 JOINT_NEAR_LIMIT warning
  joint_margin_warning_rad: 0.10
  # IK 超时 [s]
  ik_timeout: 0.2
  # 接近方向与竖直向下最大夹角 [°]，超过报 BAD_APPROACH_ANGLE
  approach_angle_max_deg: 55.0
  # 建议修正扰动步长 [m] 或 [rad]
  suggestion_perturb_xy: 0.02
  suggestion_perturb_z: 0.03
  suggestion_perturb_yaw_rad: 0.15
  # 碰撞检查：GetPlanningScene 服务名，空则不做碰撞检查
  get_planning_scene_service: ""
