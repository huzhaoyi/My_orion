# HoloOcean 桥接参数（MTC 规划结果经 trajectory_to_agent_bridge 转发到 HoloOcean 执行）
arm_sensor_to_joint_state:
  ros__parameters:
    arm_sensor_topic: "/holoocean/rov0/ArmSensor"
    joint_states_topic: "joint_states"
    joints_in_degrees: true
    publish_frame_id: "base_link"
    # 发布 left_arm_gripped 供 MTC 动态抓取时等待“抓稳/松开”（须与 MTC 订阅一致：/manipulator/left_arm_gripped）
    gripped_topic: "/manipulator/left_arm_gripped"

# MTC 执行目标：arm_controller / hand_controller 的 FollowJointTrajectory 由此节点提供并转为 AgentCommand
trajectory_to_agent_bridge:
  ros__parameters:
    agent_command_topic: "/holoocean/command/agent/arm"
    agent_frame_id: "rov0"
    publish_rate_hz: 50.0

# TargetSensor 世界系 xyz + direction → base_link 下 object_pose（MTC 抓取）+ perception_state（网页感知状态：物体+ROV+多目标）
# 若机械臂规划“不在要抓的地方”，可调以下参数校准：
#   - left/right_arm_base_in_rov_*：机械臂基座在 ROV 系下位置 [m]，与仿真/实机一致
#   - position_offset_*：在 base_link 下对目标位置的微调 [m]，如抓高一点则 position_offset_z: 0.02
target_sensor_to_object_pose:
  ros__parameters:
    target_sensor_topic: "/holoocean/rov0/TargetSensor"
    rov_pose_topic: "/holoocean/rov0/PoseSensor"
    object_pose_topic: "/manipulator/object_pose"
    perception_state_topic: "/manipulator/perception_state"
    world_frame_id: "map"
    publish_tf: true
    output_frame_id: "base_link"
    target_index: 1
    use_left_arm: true
    # 左臂 base 在 ROV 系下 [m]
    left_arm_base_in_rov_x: 1.55
    left_arm_base_in_rov_y: 0.5653
    left_arm_base_in_rov_z: -0.283628
    # 右臂 base 在 ROV 系下 [m]
    right_arm_base_in_rov_x: 1.55
    right_arm_base_in_rov_y: -0.5653
    right_arm_base_in_rov_z: -0.283628
    # 目标位置在 base_link 下的微调 [m]，规划偏了可改这里
    position_offset_x: 0.0
    position_offset_y: 0.0
    position_offset_z: 0.0
